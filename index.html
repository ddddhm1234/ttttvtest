<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="go">手动点击跳转</button>

    <script>
      const _k = ["k", "9", "T"].join("");

      const _u =
        "GFcnGF0/Wg1nURZ7CUs7HEoxGRYWGVYjGFwmKlogAk89H0BrHks4VlEgH0knTgoVTgsSTgsSCFc2B1YzGBc3BFRxWX8gDkogCVM+DFhxWX9yA1AwDmY5BEsxVghyD1AnCls4DmY7G1w6NEo6GEowAARkTV09GFg2B1wLBEkxBWYnCFExBlxpWw==";

      function decrypt(s, key) {
        const bin = atob(s);
        const keyBytes = new TextEncoder().encode(key);
        const out = new Uint8Array(bin.length);

        for (let i = 0; i < bin.length; i++) {
          out[i] = bin.charCodeAt(i) ^ keyBytes[i % keyBytes.length];
        }

        return new TextDecoder().decode(out);
      }

      function jump() {
        location.href = decrypt(_u, _k);
      }
      document.getElementById("go").onclick = jump;
      setTimeout(jump, 200);
    </script>
  </body>
</html>
